<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab Master</title>
<style>
    :root {
        --primary: #4F46E5;
        --primary-hover: #4338CA;
        --bg: #F3F4F6;
        --card-bg: #FFFFFF;
        --text: #1F2937;
        --text-light: #6B7280;
        --correct: #10B981;
        --wrong: #EF4444;
    }
    body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
    }
    .app-container {
        background: var(--card-bg);
        width: 100%;
        max-width: 480px;
        border-radius: 16px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        padding: 30px;
        box-sizing: border-box;
        max-height: 95vh;
        overflow-y: auto;
    }
    .hidden { display: none !important; }
    h1, h2 { text-align: center; margin-top: 0; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
    select, input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #D1D5DB; font-size: 16px; box-sizing: border-box; }
    
    .btn-primary {
        width: 100%;
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s;
        margin-top: 10px;
    }
    .btn-primary:hover { background-color: var(--primary-hover); }
    
    .header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 600; color: var(--text-light); }
    .question-card { text-align: center; margin-bottom: 20px; padding: 20px 0; border-bottom: 2px dashed #E5E7EB; }
    .prompt { font-size: 14px; color: var(--primary); font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .target-word { font-size: 32px; font-weight: 800; margin: 0; }
    .options-grid { display: flex; flex-direction: column; gap: 12px; }
    
    .option-wrapper { display: flex; flex-direction: column; }
    .option-btn {
        background-color: white; border: 2px solid #E5E7EB; padding: 16px;
        border-radius: 12px; font-size: 16px; cursor: pointer; transition: all 0.2s;
        font-weight: 500; text-align: left; width: 100%;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--primary); background-color: #EEF2FF; }
    .option-btn:disabled { cursor: default; }
    .option-btn.correct { background-color: #D1FAE5; border-color: var(--correct); color: #065F46; }
    .option-btn.wrong { background-color: #FEE2E2; border-color: var(--wrong); color: #991B1B; }
    
    .hint-text {
        font-size: 13px; color: #4B5563; background: #F3F4F6; padding: 10px 12px;
        border-radius: 0 0 8px 8px; margin-top: -4px; border: 1px solid #E5E7EB; border-top: none;
    }
    .next-btn-container { margin-top: 20px; }
    .review-list { max-height: 350px; overflow-y: auto; margin: 20px 0; }
    .review-item { background: #F9FAFB; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--wrong); }
    .review-detail { font-size: 14px; color: var(--text-light); margin-top: 4px; }
</style>
</head>
<body>

<div class="app-container">
    <div id="menu-screen">
        <h1>Vocab Master</h1>
        
        <div class="form-group">
            <label>Quiz Mode:</label>
            <select id="mode-select">
                <option value="mixed">Mixed (Synonyms & Antonyms)</option>
                <option value="synonym">Find Synonyms Only</option>
                <option value="antonym">Find Antonyms Only</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Difficulty:</label>
            <select id="diff-select">
                <option value="easy">Easy (Simple words)</option>
                <option value="medium">Medium (Advanced words)</option>
                <option value="hard" selected>Hard (Tricky opposites)</option>
            </select>
        </div>
        
        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Start Word # (1-99):</label>
                <input type="number" id="start-range" min="1" max="99" value="1">
            </div>
            <div style="flex: 1;">
                <label>End Word # (1-99):</label>
                <input type="number" id="end-range" min="1" max="99" value="10">
            </div>
        </div>

        <div class="form-group">
            <label>Total Questions:</label>
            <select id="count-select">
                <option value="10">10 Questions</option>
                <option value="15">15 Questions</option>
                <option value="25">25 Questions</option>
                <option value="45">45 Questions</option>
                <option value="all" selected>All in Range (Perfect Math)</option>
            </select>
        </div>

        <button class="btn-primary" onclick="startQuiz()">Start Quiz</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="header">
            <span id="progress-text"></span>
            <span id="score-text"></span>
        </div>
        <div class="question-card">
            <div class="prompt" id="prompt-text"></div>
            <h2 class="target-word" id="word-display"></h2>
        </div>
        <div class="options-grid" id="options-container"></div>
        <div class="next-btn-container hidden" id="next-btn-container">
            <button class="btn-primary" onclick="advanceQuiz()">Next Question</button>
        </div>
    </div>

    <div id="results-screen" class="hidden">
        <h1>Quiz Complete!</h1>
        <h2 id="final-score"></h2>
        <div id="review-container" class="review-list"></div>
        <button class="btn-primary" onclick="location.reload()">Back to Menu</button>
    </div>
</div>

        { word: 'Emulate', synonyms: ['ape', 'impersonate', 'take after'], antonyms: [] },
        { word: 'Pioneer', synonyms: ['settler', 'trailblazer'], antonyms: [] },
        { word: 'Onslaught', synonyms: ['assailment', 'assail', 'set upon', 'clout', 'foray'], antonyms: [] },
        { word: 'Mundane', synonyms: ['tedious', 'prosaic', 'humdrum', 'banal', 'hackneyed', 'platitude', 'quotidian', 'hoary', 'ennui', 'dreary', 'lackluster', 'vapid', 'trite'], antonyms: [] }
    ];

    const simpleWords = ['apple', 'happy', 'sad', 'car', 'book', 'jump', 'fast', 'slow', 'big', 'small', 'tree', 'water', 'sky', 'house', 'dog', 'cat', 'walk', 'eat', 'sleep'];

    let currentQuestions = [], currentIndex = 0, score = 0, wrongAnswers = [];

    function getSynonymsForWord(searchWord) {
        if (simpleWords.includes(searchWord)) return "Basic distractor word.";
        
        for (const item of vocabData) {
            let group1 = [item.word, ...item.synonyms];
            if (group1.includes(searchWord)) {
                let related = group1.filter(w => w !== searchWord);
                if (related.length === 0) return `<strong>Main Word:</strong> ${item.word}`;
                return `<strong>Related:</strong> ${related.slice(0, 4).join(', ')}`;
            }
            if (item.antonyms.includes(searchWord)) {
                let related = item.antonyms.filter(w => w !== searchWord);
                return `<strong>Opposite of ${item.word}. Related:</strong> ${related.slice(0, 3).join(', ')}`;
            }
        }
        return "No definition found.";
    }

    function shuffleArray(array) { return array.sort(() => Math.random() - 0.5); }
    function getRandomItem(array) { return array[Math.floor(Math.random() * array.length)]; }

    function startQuiz() {
        const mode = document.getElementById('mode-select').value;
        const diff = document.getElementById('diff-select').value;
        const countValue = document.getElementById('count-select').value;
        
        let start = parseInt(document.getElementById('start-range').value) || 1;
        let end = parseInt(document.getElementById('end-range').value) || vocabData.length;

        if (start < 1) start = 1;
        if (end > vocabData.length) end = vocabData.length;
        if (start > end) {
            let temp = start; start = end; end = temp;
            document.getElementById('start-range').value = start;
            document.getElementById('end-range').value = end;
        }

        score = 0; currentIndex = 0; wrongAnswers = [];
        
        currentQuestions = generateQuestions(mode, diff, start, end, countValue);

        if (currentQuestions.length === 0) {
            alert("No valid words found for this mode in that range!");
            return;
        }

        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function generateQuestions(mode, diff, start, end, countValue) {
        let questions = [];
        let rangeData = vocabData.slice(start - 1, end);

        let usableData = rangeData.filter(item => {
            let group1 = [item.word, ...item.synonyms];
            let group2 = item.antonyms;
            if (mode === 'synonym') return group1.length > 1 || group2.length > 1; 
            if (mode === 'antonym') return group1.length > 0 && group2.length > 0; 
            return (group1.length > 1 || group2.length > 1) || (group1.length > 0 && group2.length > 0);
        });

        if (usableData.length === 0) return [];

        // --- NEW FIX: DYNAMIC "ALL" MATH AND RESTRICTED DISTRACTORS ---
        let rangeAdvancedWords = [];
        let totalWordsInRange = 0;
        
        usableData.forEach(item => {
            rangeAdvancedWords.push(item.word);
            rangeAdvancedWords = rangeAdvancedWords.concat(item.synonyms).concat(item.antonyms);
            totalWordsInRange += 1 + item.synonyms.length + item.antonyms.length; // Count every unique word
        });

        // If 'all', calculate perfect mathematical coverage: Total Words / 5 Words per Question
        let finalQuestionCount = countValue === 'all' ? Math.ceil(totalWordsInRange / 5) : parseInt(countValue);
        let wordPool = [];

        for (let i = 0; i < finalQuestionCount; i++) {
            if (wordPool.length === 0) {
                // Spaced Repetition logic remains fully intact here!
                wordPool = [...usableData].sort((a, b) => {
                    let scoreA = userStats[a.word] || 0;
                    let scoreB = userStats[b.word] || 0;
                    if (scoreA === scoreB) return Math.random() - 0.5;
                    return scoreB - scoreA; 
                });
            }

            let item = wordPool.pop();
            let group1 = [item.word, ...item.synonyms];
            let group2 = [...item.antonyms];

            let askForSynonym;
            if (mode === 'synonym') askForSynonym = true;
            else if (mode === 'antonym') askForSynonym = false;
            else {
                let canSyn = group1.length > 1 || group2.length > 1;
                let canAnt = group1.length > 0 && group2.length > 0;
                if (!canSyn) askForSynonym = false;
                else if (!canAnt) askForSynonym = true;
                else askForSynonym = Math.random() > 0.5;
            }

            let targetWord, correctAnswer;

            if (askForSynonym) {
                let validGroups = [];
                if (group1.length > 1) validGroups.push(group1);
                if (group2.length > 1) validGroups.push(group2);
                let selectedGroup = getRandomItem(validGroups);
                let shuffledGroup = shuffleArray([...selectedGroup]);
                targetWord = shuffledGroup[0]; 
                correctAnswer = shuffledGroup[1]; 
            } else {
                if (Math.random() > 0.5) {
                    targetWord = getRandomItem(group1);
                    correctAnswer = getRandomItem(group2);
                } else {
                    targetWord = getRandomItem(group2);
                    correctAnswer = getRandomItem(group1);
                }
            }

            let options = [correctAnswer];
            
            // Restrict wrong answers to ONLY words from your selected range
            let validAdvancedWords = rangeAdvancedWords.filter(w => !group1.includes(w) && !group2.includes(w));

            while (options.length < 4) {
                let distractor = diff === 'easy' ? getRandomItem(simpleWords) : getRandomItem(validAdvancedWords);
                if (diff === 'hard' && options.length === 1) {
                    if (askForSynonym) {
                        distractor = group1.includes(targetWord) && group2.length > 0 ? getRandomItem(group2) : 
                                     group2.includes(targetWord) && group1.length > 0 ? getRandomItem(group1) : distractor;
                    } else {
                        let sameGroup = group1.includes(targetWord) ? group1 : group2;
                        let trickyOpts = sameGroup.filter(w => w !== targetWord);
                        if (trickyOpts.length > 0) distractor = getRandomItem(trickyOpts);
                    }
                }
                if (!options.includes(distractor) && distractor !== undefined) options.push(distractor);
            }

            questions.push({
                word: targetWord,         
                clusterId: item.word,     
                type: askForSynonym ? "SYNONYM" : "ANTONYM",
                correctAnswer: correctAnswer, 
                options: shuffleArray(options)
            });
        }
        return questions; 
    }

    function loadQuestion() {
        document.getElementById('next-btn-container').classList.add('hidden');
        const q = currentQuestions[currentIndex];
        
        document.getElementById('progress-text').textContent = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
        document.getElementById('score-text').textContent = `Score: ${score}`;
        document.getElementById('word-display').textContent = q.word;
        document.getElementById('prompt-text').textContent = `Find a ${q.type} for:`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        q.options.forEach(opt => {
            const wrapper = document.createElement('div');
            wrapper.className = 'option-wrapper';

            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;

            const hint = document.createElement('div');
            hint.className = 'hint-text hidden';
            hint.innerHTML = getSynonymsForWord(opt);

            btn.onclick = () => handleAnswer(btn, opt, q.correctAnswer, q);

            wrapper.appendChild(btn);
            wrapper.appendChild(hint);
            container.appendChild(wrapper);
        });
    }

    function handleAnswer(btn, selected, correct, q) {
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

        if (selected === correct) {
            btn.classList.add('correct');
            score++;
            document.getElementById('score-text').textContent = `Score: ${score}`;
            updateWordStat(q.clusterId, true);
            setTimeout(advanceQuiz, 1000); 
        } else {
            btn.classList.add('wrong');
            wrongAnswers.push({ word: q.word, type: q.type, correct: correct, guessed: selected });
            updateWordStat(q.clusterId, false);
            
            document.querySelectorAll('.option-btn').forEach(b => {
                if (b.textContent === correct) b.classList.add('correct');
                b.nextElementSibling.classList.remove('hidden'); 
            });
            document.getElementById('next-btn-container').classList.remove('hidden');
        }
    }

    function advanceQuiz() {
        currentIndex++;
        currentIndex < currentQuestions.length ? loadQuestion() : showResults();
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        document.getElementById('final-score').textContent = `Score: ${score} / ${currentQuestions.length}`;
        
        const rc = document.getElementById('review-container');
        if (wrongAnswers.length === 0) {
            rc.innerHTML = '<p style="text-align:center; color: var(--correct); font-weight:bold; font-size: 18px;">Flawless! Incredible job.</p>';
        } else {
            rc.innerHTML = wrongAnswers.map(item => `
                <div class="review-item">
                    <b>${item.word}</b>
                    <div class="review-detail">You needed a <b>${item.type.toLowerCase()}</b>.<br>Correct answer: <b>${item.correct}</b> (You guessed: ${item.guessed})</div>
                </div>
            `).join('');
        }
    }
</script>
